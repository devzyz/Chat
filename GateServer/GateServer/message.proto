syntax = "proto3";

package message;

// 验证码服务grpc
// GetVarifyCode为“获取验证码”远程调用函数名
service VarifyService {
	rpc GetVarifyCode (GetVarifyReq) returns (GetVarifyRsp) {}
}

// 请求结构
message GetVarifyReq {
	string email = 1;
}

// 回包结构
message GetVarifyRsp {
	int32 error = 1;
	string email = 2;
	string code = 3;
}

// 状态服务grpc
// GetChatServer为获取聊天服务器状态
// Login为在登录时进行uid/token验证
service StatusService {
	rpc GetChatServer (GetChatServerReq) returns (GetChatServerRsp) {}
	rpc Login(LoginReq) returns (LoginRsp) {}
}

// 请求结构
message GetChatServerReq {
	int32 uid = 1;
}

// 回包结构
message GetChatServerRsp {
	int32 error = 1;
	string host = 2;
	string port = 3;
	string token = 4;
}

// 请求结构
message LoginReq {
	int32 uid = 1;
	string token = 2;
}

// 回包结构
message LoginRsp {
	int32 error = 1;
	int32 uid = 2;
	string token = 3;
}

// tcp聊天服务器的grpc服务
service ChatService {

}